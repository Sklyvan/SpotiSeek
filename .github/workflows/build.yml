name: Build Executables

# Run manually from the Actions tab, or automatically when a version tag is
# pushed (e.g. `git tag v0.1.0 && git push --tags`). Tag builds also attach the
# executables to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create/update releases on tag builds

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: SpotiSeek-linux
          - os: windows-latest
            asset: SpotiSeek-windows.exe
          - os: macos-latest
            asset: SpotiSeek-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Cache uv cache directory
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install Qt runtime libraries (Linux)
        # PySide6's Qt libs need these system libraries (libEGL, xcb, xkb...).
        # Installing them here lets PyInstaller bundle them into the executable
        # (so it runs on machines without them) and lets the smoke test load Qt.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render0 libxcb-render-util0 libxcb-shape0 \
            libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies (app + GUI + build tools)
        run: uv sync --extra gui --group build

      - name: Build executable
        run: uv run python scripts/build_executable.py

      - name: Smoke-test the executable (Unix)
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen # no display on CI runners
        run: |
          chmod +x dist/SpotiSeek
          dist/SpotiSeek --selftest

      - name: Smoke-test the executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath dist\SpotiSeek.exe -ArgumentList '--selftest' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "self-test failed with exit code $($p.ExitCode)" }

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp dist/SpotiSeek.exe "out/${{ matrix.asset }}"
          else
            cp dist/SpotiSeek "out/${{ matrix.asset }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
